<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="대표, 팀장, 팀원을 위한 업무 지시, 업무일지, 주간 포커스 대시보드">
  <title>Org Focus Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Operations Control</p>
        <h1>로그인 없이 둘러보고, 테스트 계정으로도 바로 들어가 볼 수 있는 조직형 업무 대시보드</h1>
        <p class="hero-copy">대표는 전체 흐름을 보고, 팀장은 배정과 검토를 하고, 팀원은 오늘 할 일과 주간 업무를 놓치지 않게 만드는 MVP입니다.</p>
      </div>
      <div class="hero-panel">
        <div id="sessionBadge" class="session-badge">체험 준비</div>
        <div id="userMeta" class="user-meta">시작 화면에서 비로그인 체험 또는 테스트 로그인을 선택하세요.</div>
        <div id="sessionControls" class="session-controls"></div>
        <p class="hero-tip">테스트용 가상 계정과 비밀번호를 같이 보여주기 때문에, 별도 계정 생성 없이 바로 흐름을 점검할 수 있습니다.</p>
      </div>
    </header>

    <section id="accessGate" class="panel panel-wide"></section>
    <main id="app" class="app-grid hidden"></main>
  </div>

  <script src="/static/app.js" defer></script>
</body>
</html>
