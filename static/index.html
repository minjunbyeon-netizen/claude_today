<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="오늘 할 일 관리 + Claude Code 토큰 사용량 실시간 확인">
<title>Daily Focus — 오늘의 작업 & Claude 현황</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d1117;
  --surface:   #161b22;
  --surface2:  #1c2330;
  --border:    #30363d;
  --text:      #e6edf3;
  --text2:     #c9d1d9;
  --muted:     #8b949e;
  --accent:    #4493f8;
  --accent-h:  #2f81f7;
  --success:   #3fb950;
  --warning:   #d29922;
  --danger:    #f85149;
  --claude:    #e8914a;
  --claude-bg: #130d06;
  --r: 10px;
  --sidebar-w: 240px;
}

html, body {
  height: 100%;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
  font-size: 14px;
  line-height: 1.6;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── Layout ── */
.app-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

.sidebar-section {
  padding: 16px 14px 12px;
  border-bottom: 1px solid var(--border);
}
.sidebar-section:last-child { border-bottom: none; }

.sidebar-section-title {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: 10px;
}

/* ── Mini Calendar ── */
.cal-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.cal-nav-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 14px;
  padding: 2px 6px;
  border-radius: 4px;
  line-height: 1;
  transition: color .15s;
}
.cal-nav-btn:hover { color: var(--text); }
.cal-month-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
}
.cal-dow {
  font-size: 9px;
  font-weight: 700;
  color: var(--muted);
  text-align: center;
  padding: 2px 0 4px;
  text-transform: uppercase;
}
.cal-cell {
  position: relative;
  width: 100%;
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: var(--text2);
  border-radius: 50%;
  cursor: pointer;
  transition: background .12s;
}
.cal-cell:hover:not(.cal-empty) { background: var(--surface2); }
.cal-cell.cal-empty { cursor: default; color: transparent; }
.cal-cell.cal-today {
  background: var(--accent);
  color: #fff;
  font-weight: 700;
}
.cal-cell.cal-today:hover { background: var(--accent-h); }
.cal-cell.cal-selected:not(.cal-today) {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--accent);
}
.cal-cell.cal-other-month { color: var(--muted); }

.cal-dot {
  position: absolute;
  bottom: 2px;
  left: 50%;
  transform: translateX(-50%);
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--accent);
}
.cal-cell.cal-today .cal-dot { background: rgba(255,255,255,0.7); }

/* ── Week List ── */
.week-list { display: flex; flex-direction: column; gap: 2px; }
.week-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 6px;
  cursor: pointer;
  transition: background .12s;
}
.week-item:hover { background: var(--surface2); }
.week-item.active { background: var(--surface2); }
.week-item.active .week-item-day { color: var(--accent); }
.week-item.today-item .week-item-day { color: var(--accent); font-weight: 700; }

.week-item-day {
  font-size: 11px;
  color: var(--muted);
  width: 28px;
  flex-shrink: 0;
}
.week-item-date {
  font-size: 12px;
  color: var(--text2);
  flex: 1;
}
.week-item-badge {
  font-size: 10px;
  color: var(--muted);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 5px;
  white-space: nowrap;
}
.week-item-badge.done-badge { color: var(--success); border-color: #3fb95040; }

/* ── Project List ── */
.proj-list { display: flex; flex-direction: column; gap: 2px; }
.proj-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 6px;
  cursor: pointer;
  transition: background .12s;
}
.proj-item:hover { background: var(--surface2); }
.proj-item.active { background: var(--surface2); }
.proj-item.active .proj-item-name { color: var(--text); }
.proj-item-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}
.proj-item.all-item .proj-item-dot { background: var(--muted); }
.proj-item-name {
  font-size: 12px;
  color: var(--text2);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.proj-item-count {
  font-size: 10px;
  color: var(--muted);
  flex-shrink: 0;
}

/* ── Main Panel ── */
.main-panel {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.main-panel::-webkit-scrollbar { width: 5px; }
.main-panel::-webkit-scrollbar-track { background: var(--bg); }
.main-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

.main-inner {
  padding: 24px 28px;
  max-width: 960px;
  width: 100%;
  margin: 0 auto;
}

/* ── Main Header ── */
.main-hd {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 20px;
  gap: 16px;
}
.main-hd-left {}
.main-hd-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.3px;
  line-height: 1.2;
}
.main-hd-sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 3px;
}
.main-hd-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.next-ci { font-size: 11px; color: var(--muted); }

/* ── Card ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 18px;
  margin-bottom: 12px;
}

/* ── Progress ── */
.prog-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.prog-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
.prog-pct   { font-size: 26px; font-weight: 800; color: var(--accent); letter-spacing: -1px; }
.prog-bar  { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width .6s ease; }
.prog-stats { display: flex; gap: 20px; margin-top: 12px; flex-wrap: wrap; }
.stat { font-size: 12px; color: var(--muted); }
.stat b { color: var(--text2); font-weight: 600; }

/* ── Agent Sessions ── */
.sessions-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 18px;
  margin-bottom: 12px;
}
.sessions-title {
  font-size: 11px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: .1em; margin-bottom: 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.sessions-list { display: flex; flex-direction: column; gap: 6px; }
.session-row {
  display: flex; align-items: flex-start; gap: 8px;
  font-size: 12px; line-height: 1.4;
}
.session-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 3px;
}
.session-dot.start  { background: var(--accent); }
.session-dot.step   { background: var(--warning); }
.session-dot.done   { background: var(--success); }
.session-dot.stale  { background: var(--border); }
.session-proj { font-weight: 600; color: var(--text2); white-space: nowrap; }
.session-task { color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.session-ago  { font-size: 10px; color: var(--muted); white-space: nowrap; margin-left: auto; }
.sessions-empty { font-size: 12px; color: var(--muted); }

/* ── Claude Usage ── */
.claude-card {
  background: var(--claude-bg);
  border: 1px solid #e8914a28;
  border-radius: var(--r);
  padding: 18px;
  margin-bottom: 12px;
}
.claude-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.claude-title {
  font-size: 11px; font-weight: 700; color: var(--claude);
  text-transform: uppercase; letter-spacing: .1em;
  display: flex; align-items: center; gap: 6px;
}
.claude-title::before { content: ""; display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--claude); box-shadow: 0 0 6px var(--claude); }
.claude-hd-right { display: flex; align-items: center; gap: 10px; }
.claude-time { font-size: 11px; color: var(--muted); font-family: 'Courier New', monospace; }
.claude-link { font-size: 11px; color: var(--muted); text-decoration: none; }
.claude-link:hover { color: var(--claude); }

.claude-main { margin-bottom: 16px; }
.claude-main-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.claude-used-label { font-size: 13px; color: var(--text2); }
.claude-used-label b { color: var(--claude); font-size: 24px; font-weight: 800; letter-spacing: -1px; font-family: 'Courier New', monospace; }
.claude-remain { font-size: 13px; font-weight: 700; font-family: 'Courier New', monospace; }
.claude-remain.ok   { color: #4ade80; }
.claude-remain.warn { color: var(--warning); }
.claude-remain.crit { color: var(--danger); }

.claude-bar-wrap { position: relative; height: 8px; background: #2a1808; border-radius: 99px; overflow: hidden; margin-bottom: 6px; }
.claude-bar-fill { height: 100%; border-radius: 99px; transition: width .8s ease; }
.claude-bar-fill.ok   { background: linear-gradient(90deg, #c2612a, #e8914a); }
.claude-bar-fill.warn { background: linear-gradient(90deg, #b45309, var(--warning)); }
.claude-bar-fill.crit { background: linear-gradient(90deg, #991b1b, var(--danger)); }

.claude-bar-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); font-family: 'Courier New', monospace; }

.claude-sub-row { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.claude-sub { background: #1c1108; border: 1px solid #e8914a18; border-radius: 8px; padding: 10px 14px; flex: 1; min-width: 110px; }
.claude-sub .sl { font-size: 10px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .06em; }
.claude-sub .sv { font-size: 17px; font-weight: 700; color: var(--text2); font-family: 'Courier New', monospace; }
.claude-sub .sv.orange { color: var(--claude); }

.limit-row { display: flex; align-items: center; gap: 8px; }
.limit-inp { background: #0d0a06; border: 1px solid #e8914a30; border-radius: 6px; padding: 4px 8px; color: var(--text); font-size: 12px; width: 120px; outline: none; font-family: 'Courier New', monospace; }
.limit-inp:focus { border-color: var(--claude); }
.limit-btn { background: #2a1808; border: 1px solid #e8914a44; color: #e8914a; border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer; font-weight: 600; }
.limit-btn:hover { background: #3a2010; }

.claude-projects { display: flex; flex-wrap: wrap; gap: 6px; }
.proj-chip { background: #1c1108; border: 1px solid #e8914a28; border-radius: 99px; padding: 3px 10px; font-size: 11px; color: #d4a06a; display: flex; align-items: center; gap: 5px; font-family: 'Courier New', monospace; }
.proj-chip .ct { font-weight: 700; color: var(--claude); }
.claude-note { font-size: 11px; color: var(--muted); margin-top: 8px; }

/* ── Banner ── */
.banner { background: #0d2010; border: 1px solid #3fb95033; border-radius: var(--r); padding: 11px 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.banner-txt { font-size: 13px; color: #7ee787; }
.banner-btn { background: var(--success); color: #0d1117; border: none; border-radius: 6px; padding: 5px 12px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }

/* ── Add task ── */
.add-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.inp { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 7px 12px; color: var(--text); font-size: 14px; outline: none; transition: border-color .15s; }
.inp:focus { border-color: var(--accent); }
.inp::placeholder { color: var(--muted); }
.inp-title { flex: 1; min-width: 160px; }
.inp-min   { width: 68px; }
.sel { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; color: var(--text); font-size: 13px; cursor: pointer; outline: none; }
.btn-add  { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 7px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-add:hover { background: var(--accent-h); }
.btn-sync { background: transparent; border: 1px solid #3fb95044; color: #7ee787; border-radius: 6px; padding: 6px 12px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; }
.btn-sync:hover:not(:disabled) { background: #0d2010; }
.btn-sync:disabled { opacity: .45; cursor: not-allowed; }
.sync-msg { font-size: 12px; color: var(--muted); margin-top: 8px; display: none; }

/* ── Accordion ── */
.acc-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }

.acc-group { border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }

.acc-header {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px; cursor: pointer; user-select: none;
  background: var(--surface); transition: background .1s;
}
.acc-header:hover { background: var(--surface2); }

.acc-arrow { font-size: 10px; color: var(--muted); transition: transform .2s; flex-shrink: 0; width: 12px; }
.acc-arrow.open { transform: rotate(90deg); }

.acc-name { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }

.acc-pct  { font-size: 11px; color: var(--muted); min-width: 28px; text-align: right; }
.acc-mini-bar { width: 48px; height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; flex-shrink: 0; }
.acc-mini-fill { height: 100%; border-radius: 99px; }

.acc-badge { font-size: 11px; color: var(--muted); white-space: nowrap; }
.acc-badge.done { color: var(--success); font-weight: 600; }

.acc-body { display: none; background: var(--bg); }
.acc-body.open { display: block; }

/* ── Done sub-section ── */
.done-toggle {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px; cursor: pointer;
  border-top: 1px solid var(--border);
  color: var(--muted); font-size: 12px;
  user-select: none;
}
.done-toggle:hover { color: var(--text2); }
.done-toggle-arrow { font-size: 9px; transition: transform .15s; }
.done-toggle-arrow.open { transform: rotate(90deg); }
.done-list { display: none; }
.done-list.open { display: block; }

/* ── Task items ── */
.task { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
.task:last-child { border-bottom: none; }
.task.done { opacity: .38; }
.task.done .task-title { text-decoration: line-through; }

.pri-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 1px; }
.pri-dot[data-p="1"] { background: var(--danger); }
.pri-dot[data-p="2"] { background: var(--warning); }
.pri-dot[data-p="3"] { background: var(--border); }

.cb { width: 18px; height: 18px; border: 2px solid var(--border); border-radius: 50%; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.cb.on { background: var(--success); border-color: var(--success); }
.cb.on::after { content: "✓"; font-size: 10px; color: #0d1117; font-weight: 800; }

.task-title { flex: 1; font-size: 14px; color: var(--text2); line-height: 1.4; }
.carry-badge { font-size: 10px; color: var(--muted); background: var(--surface); border-radius: 4px; padding: 1px 5px; margin-right: 5px; border: 1px solid var(--border); }

.task-min-wrap { position: relative; }
.task-min {
  font-size: 12px; color: var(--muted); cursor: pointer;
  padding: 2px 6px; border-radius: 4px; border: 1px solid transparent;
  transition: all .15s; white-space: nowrap;
}
.task-min:hover { border-color: var(--border); color: var(--text2); }
.task-min-input {
  display: none; width: 56px; font-size: 12px; color: var(--text);
  background: var(--surface); border: 1px solid var(--accent);
  border-radius: 4px; padding: 2px 6px; outline: none;
}
.task-min-input.show { display: inline-block; }
.task-min.hide { display: none; }

.task-del { background: none; border: none; color: var(--border); cursor: pointer; font-size: 16px; line-height: 1; padding: 0 4px; transition: color .15s; flex-shrink: 0; }
.task-del:hover { color: var(--danger); }

.empty { text-align: center; color: var(--muted); padding: 32px; font-size: 13px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); }

/* ── Check-in ── */
.ci-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.sec-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
.btn-ci { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); border-radius: 6px; padding: 5px 12px; font-size: 12px; cursor: pointer; transition: all .15s; }
.btn-ci:hover { border-color: var(--accent); color: var(--accent); }
.ci-form { display: none; margin-bottom: 12px; }
.ci-form.open { display: block; }
.ci-note { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 9px 12px; color: var(--text); font-size: 13px; outline: none; resize: vertical; min-height: 60px; font-family: inherit; line-height: 1.6; margin-bottom: 8px; }
.ci-note:focus { border-color: var(--accent); }
.btn-save { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 6px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }

.ci-hist { display: flex; flex-direction: column; gap: 6px; }
.ci-entry { background: var(--surface2); border-radius: 6px; padding: 9px 12px; border: 1px solid var(--border); }
.ci-time   { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
.ci-counts { font-size: 13px; font-weight: 600; color: var(--text2); }
.ci-note-disp { font-size: 12px; color: var(--muted); margin-top: 4px; font-style: italic; line-height: 1.5; }
.ci-empty  { font-size: 13px; color: var(--muted); }

/* ── CC button ── */
.btn-cc {
  background: #0a1a0a; border: 1px solid #3fb95050; color: #7ee787;
  border-radius: 4px; padding: 2px 8px; font-size: 10px; font-weight: 700;
  cursor: pointer; transition: all .15s; flex-shrink: 0;
  font-family: 'Courier New', monospace; letter-spacing: .04em;
}
.btn-cc:hover { background: #0d2010; border-color: #3fb950aa; color: #a8f5b0; }
.btn-cc:active { transform: scale(.95); }

/* ── Project filter notice ── */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 12px;
  font-size: 12px;
  color: var(--muted);
}
.filter-bar span { color: var(--accent); font-weight: 600; }
.filter-clear {
  margin-left: auto;
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 4px;
  padding: 2px 8px;
  font-size: 11px;
  cursor: pointer;
  transition: all .15s;
}
.filter-clear:hover { border-color: var(--accent); color: var(--accent); }

/* ── Refresh btn ── */
.icon-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 14px;
  padding: 4px;
  line-height: 1;
  border-radius: 4px;
  transition: color .15s;
}
.icon-btn:hover { color: var(--text); }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
</style>
</head>
<body>

<div class="app-layout">

  <!-- ════════ SIDEBAR ════════ -->
  <aside class="sidebar">

    <!-- 1. 월별 캘린더 -->
    <div class="sidebar-section">
      <div class="sidebar-section-title">캘린더</div>
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="calPrev()">&#8249;</button>
        <span class="cal-month-label" id="calMonthLabel"></span>
        <button class="cal-nav-btn" onclick="calNext()">&#8250;</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- 2. 주별 일정 -->
    <div class="sidebar-section">
      <div class="sidebar-section-title">이번 주</div>
      <div class="week-list" id="weekList"></div>
    </div>

    <!-- 3. 프로젝트별 -->
    <div class="sidebar-section">
      <div class="sidebar-section-title">프로젝트</div>
      <div class="proj-list" id="projList"></div>
    </div>

  </aside>

  <!-- ════════ MAIN PANEL ════════ -->
  <main class="main-panel">
    <div class="main-inner">

      <!-- Main Header -->
      <div class="main-hd">
        <div class="main-hd-left">
          <div class="main-hd-title" id="mainTitle"></div>
          <div class="main-hd-sub" id="mainSub"></div>
        </div>
        <div class="main-hd-right">
          <div class="next-ci" id="nextCi"></div>
        </div>
      </div>

      <!-- Claude Usage (compact) -->
      <div class="claude-card">
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <span class="claude-title">Claude</span>
          <div class="claude-bar-wrap" style="flex:1;min-width:80px;margin:0">
            <div class="claude-bar-fill ok" id="claudeBar" style="width:0%"></div>
          </div>
          <span class="claude-remain ok" id="claudeRemain" style="font-size:13px">—</span>
          <span id="claudeUsedTok" style="font-size:11px;color:var(--muted);font-family:'Courier New',monospace"></span>
          <span style="font-size:11px;color:var(--muted)">오늘 <span id="claudeToday" style="color:var(--claude)">-</span></span>
          <span id="claudeMonthLabel" style="font-size:11px;color:var(--muted)"></span>
          <button onclick="loadClaudeUsage()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:0" title="새로고침">↻</button>
          <a class="claude-link" href="https://claude.ai/settings/usage" target="_blank">↗</a>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap">
          <span style="font-size:11px;color:var(--muted)">한도</span>
          <input class="limit-inp" id="limitInp" type="text" placeholder="예: 2000000000" style="width:130px">
          <button class="limit-btn" onclick="saveLimit()">저장</button>
          <div class="claude-projects" id="claudeProjects" style="flex:1"></div>
        </div>
        <div class="claude-note" id="claudeNote"></div>
        <!-- hidden elements for JS compatibility -->

        <span id="claudeTime" style="display:none"></span>
        <span id="claudeUsedPct" style="display:none">0</span>
        <span id="claudeLimitTok" style="display:none"></span>
        <span id="claudeInput" style="display:none"></span>
        <span id="claudeOutput" style="display:none"></span>
        <span id="claudeCache" style="display:none"></span>
        <span id="limitHint" style="display:none"></span>
      </div>

      <!-- Agent Sessions -->
      <div class="sessions-card">
        <div class="sessions-title">
          <span>세션 현황</span>
          <span id="sessionsTime" style="font-size:10px;font-weight:400;color:var(--muted);font-family:'Courier New',monospace"></span>
        </div>
        <div class="sessions-list" id="sessionsList">
          <span class="sessions-empty">연결된 세션 없음</span>
        </div>
      </div>

      <!-- Progress -->
      <div class="card">
        <div class="prog-hd">
          <div>
            <span class="prog-label">완료율</span>
            <span id="progRefreshTime" style="font-size:10px;color:var(--muted);margin-left:8px;font-family:'Courier New',monospace"></span>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <button class="icon-btn" onclick="refreshMain()" title="새로고침">↻</button>
            <span class="prog-pct" id="progPct">-</span>
          </div>
        </div>
        <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
        <div class="prog-stats">
          <div class="stat">작업 <b id="stTasks">-/-</b></div>
          <div class="stat">예상 시간 <b id="stTime">-</b></div>
          <div class="stat">남은 <b id="stLeft">-</b></div>
        </div>
      </div>

      <!-- Carry-over banner -->
      <div class="banner" id="carryBanner" style="display:none">
        <div class="banner-txt" id="carryTxt"></div>
        <button class="banner-btn" onclick="doCarry()">오늘로 이월</button>
      </div>

      <!-- Add task -->
      <div class="card">
        <div class="add-row">
          <input class="inp inp-title" id="inTitle" placeholder="할 일 추가..." onkeydown="if(e(event))addTask()">
          <input class="inp inp-min"   id="inMin" type="number" value="30" min="5" max="480" title="예상 시간 (분)">
          <select class="sel" id="inPri">
            <option value="1">높음</option>
            <option value="2" selected>보통</option>
            <option value="3">낮음</option>
          </select>
          <button class="btn-add"  onclick="addTask()">+ 추가</button>
          <button class="btn-sync" id="syncBtn" onclick="syncLogs()">↻ 동기화</button>
          <input type="file" id="logFolderInput" webkitdirectory multiple accept=".md" style="display:none" onchange="uploadLogsFromFolder(this)">
        </div>
        <div class="sync-msg" id="syncMsg"></div>
      </div>

      <!-- Project filter notice -->
      <div class="filter-bar" id="filterBar" style="display:none">
        프로젝트 필터: <span id="filterLabel"></span>
        <button class="filter-clear" onclick="clearProjectFilter()">전체 보기</button>
      </div>

      <!-- Accordion -->
      <div class="acc-list" id="accList"></div>

      <!-- Check-in -->
      <div class="card">
        <div class="ci-hd">
          <span class="sec-title">체크인 기록</span>
          <button class="btn-ci" onclick="toggleCi()">체크인 남기기</button>
        </div>
        <div class="ci-form" id="ciForm">
          <textarea class="ci-note" id="ciNote" placeholder="진행 상황, 막힌 부분, 다음 집중 포인트..."></textarea>
          <button class="btn-save" onclick="saveCheckin()">저장</button>
        </div>
        <div class="ci-hist" id="ciHist"></div>
      </div>

    </div>
  </main>
</div>

<script>
const DAYS   = ['일','월','화','수','목','금','토'];
const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const CHECK_HOURS = [9,11,13,15,17,19];

const e   = ev => ev.key === 'Enter';
const esc = s  => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const p2  = n  => String(n).padStart(2,'0');

// ── State ─────────────────────────────────────────────────────
let currentViewDate  = todayStr();   // YYYY-MM-DD (선택된 날짜)
let currentProject   = null;         // null = 전체, string = 프로젝트명
let allTasks         = [];           // 현재 로드된 전체 태스크
let weekTaskMap      = {};           // { 'YYYY-MM-DD': { total, done } }
let calViewYear      = new Date().getFullYear();
let calViewMonth     = new Date().getMonth();  // 0-based

// Accordion state
let openGroups = new Set(JSON.parse(localStorage.getItem('acc_open') || '[]'));
function saveOpen() { localStorage.setItem('acc_open', JSON.stringify([...openGroups])); }

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
}
function fmtT(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${p2(d.getHours())}:${p2(d.getMinutes())}`;
}
function fmtTok(n) {
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return String(n);
}

// ── Main header update ────────────────────────────────────────
function updateMainHeader() {
  const titleEl = document.getElementById('mainTitle');
  const subEl   = document.getElementById('mainSub');
  const today   = todayStr();

  if (currentProject) {
    titleEl.textContent = '[' + currentProject + '] 프로젝트';
    subEl.textContent   = '프로젝트 필터 — 모든 날짜';
  } else {
    const d = new Date(currentViewDate + 'T00:00:00');
    const isToday = currentViewDate === today;
    const dayLabel = DAYS[d.getDay()] + '요일';
    titleEl.textContent = `${d.getFullYear()}년 ${MONTHS[d.getMonth()]} ${d.getDate()}일`;
    subEl.textContent   = isToday ? `오늘 · ${dayLabel}` : dayLabel;
  }
}

function updateCountdown() {
  const now = new Date(), cur = now.getHours()*60+now.getMinutes();
  const next = CHECK_HOURS.find(h => h*60 > cur);
  const el = document.getElementById('nextCi');
  if (!next) { el.textContent = '오늘 체크인 종료'; return; }
  const diff = next*60 - cur;
  el.textContent = diff >= 60
    ? `다음 체크인까지 ${Math.floor(diff/60)}시간 ${diff%60}분`
    : `다음 체크인까지 ${diff}분`;
}

// ── Mini Calendar ─────────────────────────────────────────────
function calPrev() {
  calViewMonth--;
  if (calViewMonth < 0) { calViewMonth = 11; calViewYear--; }
  renderCalendar();
}
function calNext() {
  calViewMonth++;
  if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
  renderCalendar();
}

function renderCalendar() {
  const today = todayStr();
  const label = `${calViewYear}년 ${MONTHS[calViewMonth]}`;
  document.getElementById('calMonthLabel').textContent = label;

  const firstDay = new Date(calViewYear, calViewMonth, 1);
  const lastDay  = new Date(calViewYear, calViewMonth + 1, 0);
  const startDow = firstDay.getDay(); // 0=Sun
  const totalCells = Math.ceil((startDow + lastDay.getDate()) / 7) * 7;

  const dows = ['일','월','화','수','목','금','토'];
  let html = dows.map(d => `<div class="cal-dow">${d}</div>`).join('');

  for (let i = 0; i < totalCells; i++) {
    const dayNum = i - startDow + 1;
    if (dayNum < 1 || dayNum > lastDay.getDate()) {
      html += `<div class="cal-cell cal-empty"></div>`;
      continue;
    }
    const ds = `${calViewYear}-${p2(calViewMonth+1)}-${p2(dayNum)}`;
    const isToday    = ds === today;
    const isSelected = ds === currentViewDate && !currentProject;
    const hasTasks   = weekTaskMap[ds] && weekTaskMap[ds].total > 0;
    const cls = [
      'cal-cell',
      isToday    ? 'cal-today'    : '',
      isSelected ? 'cal-selected' : '',
    ].filter(Boolean).join(' ');

    const dot = hasTasks ? '<span class="cal-dot"></span>' : '';
    html += `<div class="${cls}" onclick="selectDate('${ds}')">${dayNum}${dot}</div>`;
  }

  document.getElementById('calGrid').innerHTML = html;
}

// ── Week List (sidebar) ───────────────────────────────────────
async function renderWeekList() {
  const today = todayStr();
  const d = new Date();
  // 이번 주 월요일 계산
  const dow = d.getDay(); // 0=Sun
  const diffToMon = (dow === 0) ? -6 : 1 - dow;
  const mon = new Date(d);
  mon.setDate(d.getDate() + diffToMon);

  const dayNames = ['월','화','수','목','금','토','일'];
  let html = '';

  for (let i = 0; i < 7; i++) {
    const day = new Date(mon);
    day.setDate(mon.getDate() + i);
    const ds = `${day.getFullYear()}-${p2(day.getMonth()+1)}-${p2(day.getDate())}`;
    const isToday    = ds === today;
    const isSelected = ds === currentViewDate && !currentProject;
    const dd = weekTaskMap[ds] || { total: 0, done: 0 };
    const allDone = dd.total > 0 && dd.done === dd.total;

    const badgeCls = allDone ? 'week-item-badge done-badge' : 'week-item-badge';
    const badgeTxt = dd.total > 0 ? `${dd.done}/${dd.total}` : '';
    const badge    = badgeTxt ? `<span class="${badgeCls}">${badgeTxt}</span>` : '';

    const cls = [
      'week-item',
      isToday    ? 'today-item' : '',
      isSelected ? 'active'     : '',
    ].filter(Boolean).join(' ');

    html += `<div class="${cls}" onclick="selectDate('${ds}')">
      <span class="week-item-day">${dayNames[i]}</span>
      <span class="week-item-date">${day.getMonth()+1}/${day.getDate()}</span>
      ${badge}
    </div>`;
  }

  document.getElementById('weekList').innerHTML = html;
}

// squad-team 하위 팀 → 'squad-team' 으로 그룹핑
const SQUAD_TEAMS = new Set(['기획팀','실무팀','검수팀','소비자팀','리뷰팀']);
function normalizeProject(name) {
  return SQUAD_TEAMS.has(name) ? 'squad-team' : name;
}

// ── Project List (sidebar) ────────────────────────────────────
function renderProjectList(tasks) {
  const counts = {};
  for (const t of tasks) {
    const m = t.title.match(/^\[([^\]]+)\]/);
    const proj = normalizeProject(m ? m[1] : '기타');
    if (!counts[proj]) counts[proj] = 0;
    counts[proj]++;
  }

  const total = tasks.length;
  const projEntries = Object.entries(counts).sort((a,b) => b[1]-a[1]);

  let html = `<div class="proj-item all-item ${!currentProject?'active':''}" onclick="selectProject(null)">
    <div class="proj-item-dot"></div>
    <span class="proj-item-name">전체</span>
    <span class="proj-item-count">${total}</span>
  </div>`;

  html += projEntries.map(([name, cnt]) => {
    const isActive = currentProject === name;
    return `<div class="proj-item ${isActive?'active':''}" onclick="selectProject('${esc(name)}')">
      <div class="proj-item-dot"></div>
      <span class="proj-item-name">${esc(name)}</span>
      <span class="proj-item-count">${cnt}</span>
    </div>`;
  }).join('');

  document.getElementById('projList').innerHTML = html;
}

// ── Navigation actions ────────────────────────────────────────
function selectDate(ds) {
  currentViewDate = ds;
  currentProject  = null;
  updateMainHeader();
  renderCalendar();
  renderWeekList();
  loadTodayByDate(ds);
}

function selectProject(proj) {
  currentProject = proj;
  if (!proj) {
    // 프로젝트 해제 시 현재 날짜로 복원
    updateMainHeader();
    renderCalendar();
    renderWeekList();
    renderProjectList(allTasks);
    applyProjectFilter();
  } else {
    updateMainHeader();
    renderProjectList(allTasks);
    applyProjectFilter();
  }
}

function clearProjectFilter() {
  selectProject(null);
}

function applyProjectFilter() {
  const filterBar   = document.getElementById('filterBar');
  const filterLabel = document.getElementById('filterLabel');

  if (currentProject) {
    filterBar.style.display   = 'flex';
    filterLabel.textContent   = '[' + currentProject + ']';
    const filtered = allTasks.filter(t => {
      const m = t.title.match(/^\[([^\]]+)\]/);
      const p = m ? m[1] : '기타';
      if (currentProject === 'squad-team') return SQUAD_TEAMS.has(p);
      return p === currentProject;
    });
    renderAccordion(filtered);
    updateProgressFromTasks(filtered);
  } else {
    filterBar.style.display = 'none';
    renderAccordion(allTasks);
    updateProgressFromAllStats();
  }
}

// ── Group by [project] ────────────────────────────────────────
function groupTasks(tasks) {
  const groups = {}, order = [];
  for (const t of tasks) {
    const m = t.title.match(/^\[([^\]]+)\]/);
    const proj = normalizeProject(m ? m[1] : '기타');
    if (!groups[proj]) { groups[proj] = []; order.push(proj); }
    groups[proj].push(t);
  }
  return { groups, order };
}

const FILL_COLOR = { 1: 'var(--danger)', 2: 'var(--warning)', 3: 'var(--border)' };

// ── Render accordion ──────────────────────────────────────────
function renderAccordion(tasks) {
  const list = document.getElementById('accList');
  if (!tasks.length) {
    list.innerHTML = '<div class="empty">할 일을 추가하거나 ↻ 동기화를 눌러보세요</div>';
    return;
  }

  const { groups, order } = groupTasks(tasks);

  const sortedKeys = [...order].sort((a,b) => {
    const aAll = groups[a].every(t => t.status==='done') ? 1 : 0;
    const bAll = groups[b].every(t => t.status==='done') ? 1 : 0;
    return aAll - bAll;
  });

  if (openGroups.size === 0) {
    sortedKeys.forEach(k => {
      if (!groups[k].every(t => t.status==='done')) openGroups.add(k);
    });
    saveOpen();
  }

  list.innerHTML = sortedKeys.map(proj => {
    const items    = groups[proj];
    const total    = items.length, done = items.filter(t=>t.status==='done').length;
    const pct      = total > 0 ? Math.round(done/total*100) : 0;
    const allDone  = done === total && total > 0;
    const fillColor= allDone ? 'var(--success)' : 'var(--accent)';
    const totalMin = items.reduce((s,t) => s+t.estimated_minutes, 0);
    const isOpen   = openGroups.has(proj);

    const todoItems = items.filter(t => t.status !== 'done');
    const doneItems = items.filter(t => t.status === 'done');

    const renderTask = t => {
      const isDone = t.status === 'done';
      const title  = t.title.replace(/^\[[^\]]+\]\s*/, '');
      return `
        <div class="task ${isDone?'done':''}" data-id="${t.id}">
          <div class="pri-dot" data-p="${t.priority}"></div>
          <div class="cb ${isDone?'on':''}" onclick="toggleTask(${t.id},${isDone})"></div>
          <div class="task-title">
            ${t.carry_from ? '<span class="carry-badge">이월</span>' : ''}
            ${esc(title)}
          </div>
          <div class="task-min-wrap">
            <span class="task-min" onclick="editMin(this,${t.id})" title="클릭하여 시간 수정">${t.estimated_minutes}분</span>
            <input class="task-min-input" type="number" min="5" max="480"
              onblur="saveMin(this,${t.id})" onkeydown="if(event.key==='Enter')this.blur()">
          </div>
          <button class="task-del" onclick="delTask(${t.id})">×</button>
        </div>`;
    };

    const todoHtml = todoItems.map(renderTask).join('');
    const doneHtml = doneItems.length ? `
      <div class="done-toggle" onclick="toggleDoneSection(this)">
        <span class="done-toggle-arrow">▶</span>
        <span>완료 ${doneItems.length}개</span>
      </div>
      <div class="done-list">${doneItems.map(renderTask).join('')}</div>` : '';

    return `
      <div class="acc-group">
        <div class="acc-header" onclick="toggleAcc('${esc(proj)}')">
          <span class="acc-arrow ${isOpen?'open':''}">▶</span>
          <span class="acc-name">${esc(proj)}</span>
          <span class="acc-pct">${pct}%</span>
          <div class="acc-mini-bar">
            <div class="acc-mini-fill" style="width:${pct}%;background:${fillColor}"></div>
          </div>
          <span class="acc-badge ${allDone?'done':''}">${done}/${total}</span>
          <span class="acc-badge">${totalMin}분</span>
          <button class="btn-cc" onclick="event.stopPropagation();openClaude('${esc(proj)}')" title="Claude Code 열기">CC</button>
        </div>
        <div class="acc-body ${isOpen?'open':''}">${todoHtml}${doneHtml}</div>
      </div>`;
  }).join('');
}

function toggleAcc(proj) {
  openGroups.has(proj) ? openGroups.delete(proj) : openGroups.add(proj);
  saveOpen();
  document.querySelectorAll('.acc-header').forEach(hd => {
    if (hd.querySelector('.acc-name')?.textContent === proj) {
      hd.querySelector('.acc-arrow').classList.toggle('open', openGroups.has(proj));
      hd.nextElementSibling.classList.toggle('open', openGroups.has(proj));
    }
  });
}

function toggleDoneSection(toggleEl) {
  const arrow = toggleEl.querySelector('.done-toggle-arrow');
  const list  = toggleEl.nextElementSibling;
  const open  = list.classList.toggle('open');
  arrow.classList.toggle('open', open);
}

// ── Inline time editing ───────────────────────────────────────
function editMin(span, id) {
  const inp = span.nextElementSibling;
  inp.value = parseInt(span.textContent);
  span.classList.add('hide');
  inp.classList.add('show');
  inp.focus(); inp.select();
}
async function saveMin(inp, id) {
  const val = Math.max(5, Math.min(480, parseInt(inp.value)||30));
  await fetch(`/api/tasks/${id}`, {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({estimated_minutes: val})
  });
  await refreshMain();
}

// ── Progress update helpers ───────────────────────────────────
let _lastStats = null;

function updateProgressFromTasks(tasks) {
  const total = tasks.length;
  const done  = tasks.filter(t => t.status==='done').length;
  const pct   = total > 0 ? Math.round(done/total*100) : 0;
  const totalMin = tasks.reduce((s,t) => s+t.estimated_minutes, 0);
  const doneMin  = tasks.filter(t=>t.status==='done').reduce((s,t) => s+t.estimated_minutes, 0);
  const left = totalMin - doneMin;

  document.getElementById('progPct').textContent  = pct + '%';
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('stTasks').textContent  = `${done}/${total}`;
  document.getElementById('stTime').textContent   = `${doneMin}/${totalMin}분`;
  document.getElementById('stLeft').textContent   = left > 0 ? `${left}분` : '완료!';
}

function updateProgressFromAllStats() {
  if (!_lastStats) return;
  const s = _lastStats;
  const pct = s.total > 0 ? Math.round(s.done / s.total * 100) : 0;
  document.getElementById('progPct').textContent  = pct + '%';
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('stTasks').textContent  = `${s.done}/${s.total}`;
  document.getElementById('stTime').textContent   = `${s.done_minutes}/${s.total_minutes}분`;
  const left = s.total_minutes - s.done_minutes;
  document.getElementById('stLeft').textContent   = left > 0 ? `${left}분` : '완료!';
}

// ── Load by date ──────────────────────────────────────────────
async function loadTodayByDate(ds) {
  try {
    const isToday = ds === todayStr();
    const url     = isToday ? '/api/today' : `/api/today?d=${ds}`;
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const { tasks, stats } = await r.json();

    _lastStats  = stats;
    allTasks    = tasks;

    updateProgressFromAllStats();

    const now = new Date();
    document.getElementById('progRefreshTime').textContent =
      `${p2(now.getHours())}:${p2(now.getMinutes())}:${p2(now.getSeconds())} 기준`;

    if (currentProject) {
      applyProjectFilter();
    } else {
      renderAccordion(tasks);
    }

    renderProjectList(tasks);

    if (isToday) {
      loadCheckins();
      checkCarry();
    }
  } catch(err) {
    document.getElementById('progPct').textContent = '오류';
    document.getElementById('progRefreshTime').textContent = '로드 실패';
    console.error('loadTodayByDate 실패:', err);
  }
}

async function loadToday() {
  await loadTodayByDate(currentViewDate);
}

function refreshMain() {
  if (currentProject) {
    loadTodayByDate(todayStr());
  } else {
    loadTodayByDate(currentViewDate);
  }
}

// ── Week task map (for calendar dots) ────────────────────────
async function loadWeekTaskMap() {
  try {
    const r = await fetch('/api/week');
    const data = await r.json();
    weekTaskMap = data.daily || {};
    renderCalendar();
    renderWeekList();
  } catch(err) {
    renderCalendar();
    renderWeekList();
  }
}

// ── Task CRUD ─────────────────────────────────────────────────
async function addTask() {
  const title = document.getElementById('inTitle').value.trim();
  if (!title) return;
  const min      = parseInt(document.getElementById('inMin').value)||30;
  const priority = parseInt(document.getElementById('inPri').value);
  await fetch('/api/tasks', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({title, estimated_minutes:min, priority})
  });
  document.getElementById('inTitle').value = '';
  await refreshMain();
}

async function toggleTask(id, isDone) {
  await fetch(`/api/tasks/${id}`, {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({status: isDone ? 'todo' : 'done'})
  });
  await refreshMain();
  await loadWeekTaskMap();
}

async function delTask(id) {
  await fetch(`/api/tasks/${id}`, {method:'DELETE'});
  await refreshMain();
}

async function checkCarry() {
  const r = await fetch('/api/yesterday-undone');
  const tasks = await r.json();
  const banner = document.getElementById('carryBanner');
  if (tasks.length) {
    document.getElementById('carryTxt').textContent = `어제 미완료 작업 ${tasks.length}개가 있습니다`;
    banner.style.display = 'flex';
  } else banner.style.display = 'none';
}
async function doCarry() {
  await fetch('/api/carry-over', {method:'POST'});
  document.getElementById('carryBanner').style.display = 'none';
  await refreshMain();
}

// ── Check-in ──────────────────────────────────────────────────
function toggleCi() {
  const f = document.getElementById('ciForm');
  f.classList.toggle('open');
  if (f.classList.contains('open')) document.getElementById('ciNote').focus();
}
async function saveCheckin() {
  const note = document.getElementById('ciNote').value;
  await fetch('/api/checkin', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({note})
  });
  document.getElementById('ciNote').value = '';
  document.getElementById('ciForm').classList.remove('open');
  await loadCheckins();
  await refreshMain();
}
async function loadCheckins() {
  const r = await fetch('/api/checkins');
  const list = await r.json();
  const el = document.getElementById('ciHist');
  if (!list.length) {
    el.innerHTML = '<div class="ci-empty">아직 체크인 기록이 없습니다</div>'; return;
  }
  el.innerHTML = [...list].reverse().map(c => {
    const pct = c.total_count>0 ? Math.round(c.completed_count/c.total_count*100) : 0;
    return `<div class="ci-entry">
      <div class="ci-time">${fmtT(c.checkin_time)}</div>
      <div class="ci-counts">${c.completed_count}/${c.total_count} 완료 (${pct}%)</div>
      ${c.note ? `<div class="ci-note-disp">${esc(c.note)}</div>` : ''}
    </div>`;
  }).join('');
}

// ── Sync ──────────────────────────────────────────────────────
function syncLogs() {
  document.getElementById('logFolderInput').click();
}

async function uploadLogsFromFolder(input) {
  const btn = document.getElementById('syncBtn');
  const msg = document.getElementById('syncMsg');
  btn.disabled = true; btn.textContent = '동기화 중...';
  msg.style.display = 'block';
  msg.style.color = 'var(--muted)';
  msg.textContent = '파일 읽는 중...';

  const files = Array.from(input.files);
  const todoFiles = files.filter(f => f.name.endsWith('_todo.md'));
  const currentTaskFile = files.find(f => f.name === 'current_task.md');

  if (!todoFiles.length) {
    msg.style.color = 'var(--danger)';
    msg.textContent = '_todo.md 파일 없음 — squad-team/logs 폴더를 선택해주세요';
    btn.disabled = false; btn.textContent = '↻ 동기화';
    return;
  }

  const readFile = f => new Promise(res => {
    const r = new FileReader();
    r.onload = ev => res(ev.target.result);
    r.readAsText(f, 'utf-8');
  });

  const logFiles = {};
  for (const f of todoFiles) logFiles[f.name] = await readFile(f);
  const currentTask = currentTaskFile ? await readFile(currentTaskFile) : '';

  try {
    msg.textContent = '서버에 전송 중...';
    const r = await fetch('/api/sync-logs-upload', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({log_files: logFiles, current_task: currentTask}),
    });
    const logs = await r.json();
    const logImp = logs.imported?.length || 0;
    const logUpd = logs.updated?.length  || 0;
    const parts = [];
    if (logImp > 0) parts.push(`${logImp}개 신규`);
    if (logUpd > 0) parts.push(`${logUpd}개 완료 업데이트`);
    if (!parts.length) parts.push('변경 없음');
    msg.style.color = (logImp + logUpd) > 0 ? 'var(--success)' : 'var(--muted)';
    msg.textContent = parts.join(' · ');
  } catch(err) {
    msg.style.color = 'var(--danger)';
    msg.textContent = '전송 오류';
  }

  input.value = '';
  await refreshMain();
  await loadWeekTaskMap();
  btn.disabled = false; btn.textContent = '↻ 동기화';
}

// ── Claude Usage ──────────────────────────────────────────────
function barClass(pct) {
  if (pct >= 90) return 'crit';
  if (pct >= 70) return 'warn';
  return 'ok';
}

async function loadClaudeUsage() {
  try {
    const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
    const endpoint = isLocal ? '/api/claude-usage' : '/api/claude-usage-cached';
    const r = await fetch(endpoint);
    const d = await r.json();

    const now = new Date();
    document.getElementById('claudeTime').textContent =
      `기준 ${p2(now.getHours())}:${p2(now.getMinutes())}`;
    document.getElementById('claudeMonthLabel').textContent = d.month_label || '';

    const pct = d.used_pct || 0;
    const cls = barClass(pct);
    const bar = document.getElementById('claudeBar');
    bar.style.width = Math.min(pct, 100) + '%';
    bar.className   = `claude-bar-fill ${cls}`;

    document.getElementById('claudeUsedPct').textContent = pct.toFixed(1);

    const rem = document.getElementById('claudeRemain');
    rem.className   = `claude-remain ${cls}`;
    rem.textContent = `${d.remain_pct.toFixed(1)}% 남음`;

    document.getElementById('claudeUsedTok').textContent  = fmtTok(d.month_tokens||0) + ' 사용';
    document.getElementById('claudeLimitTok').textContent = d.token_limit
      ? '한도 ' + fmtTok(d.token_limit)
      : '한도 미설정';

    const mt = d.month_total || {};
    document.getElementById('claudeToday').textContent  = fmtTok(d.today_tokens||0);
    document.getElementById('claudeInput').textContent  = fmtTok(mt.input||0);
    document.getElementById('claudeOutput').textContent = fmtTok(mt.output||0);
    document.getElementById('claudeCache').textContent  = fmtTok(mt.cache_read||0);

    const limitInp = document.getElementById('limitInp');
    if (!limitInp.dataset.init) {
      limitInp.value = d.token_limit || '';
      limitInp.dataset.init = '1';
      document.getElementById('limitHint').textContent = 'Max 5x≈2B / Max 20x≈8B';
    }

    const projects = d.by_project || [];
    if (!projects.length || d.month_tokens === 0) {
      document.getElementById('claudeProjects').innerHTML =
        '<span style="font-size:12px;color:var(--muted)">세션 종료 후 반영됩니다</span>';
    } else {
      document.getElementById('claudeProjects').innerHTML = projects
        .filter(p => p.name !== '기타')
        .slice(0,8).map(p => {
          const ptok = p.input+p.output+p.cache_create+p.cache_read;
          return `<div class="proj-chip">
            <span class="ct">${fmtTok(ptok)}</span>
            <span>${esc(p.name)}</span>
          </div>`;
        }).join('');
    }
    document.getElementById('claudeNote').textContent =
      d.month_tokens === 0 ? '(현재 진행 중인 세션은 종료 후 집계됩니다)' : '';
  } catch(err) {
    document.getElementById('claudeRemain').textContent = '불러오기 실패';
  }
}

async function saveLimit() {
  const raw = document.getElementById('limitInp').value.replace(/,/g,'').trim();
  const val = parseInt(raw);
  if (!val || val < 1000) { alert('올바른 토큰 수를 입력하세요 (예: 2000000000)'); return; }
  await fetch(`/api/settings/token-limit?limit=${val}`, {method:'POST'});
  document.getElementById('limitInp').dataset.init = '';
  await loadClaudeUsage();
}

// ── Open Claude Code ──────────────────────────────────────────
async function openClaude(proj) {
  const r = await fetch(`/api/open-claude?proj=${encodeURIComponent(proj)}`, {method:'POST'});
  const d = await r.json();
  if (!d.ok) alert(`Claude Code 열기 실패\n${d.error}`);
}

// 4) 세션 현황 로드
async function loadAgentStatus() {
  try {
    const rows = await fetch('/api/agent-status').then(r => r.json());
    const el = document.getElementById('sessionsList');
    document.getElementById('sessionsTime').textContent =
      new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    if (!rows.length) {
      el.innerHTML = '<span class="sessions-empty">연결된 세션 없음</span>';
      return;
    }
    el.innerHTML = rows.map(r => {
      const stale = r.minutes_ago > 30;
      const dotCls = stale ? 'stale' : r.status;
      const agoTxt = r.minutes_ago < 1 ? '방금' :
                     r.minutes_ago < 60 ? `${r.minutes_ago}분 전` :
                     `${Math.floor(r.minutes_ago/60)}시간 전`;
      return `<div class="session-row">
        <div class="session-dot ${dotCls}"></div>
        <span class="session-proj">${esc(r.project)}</span>
        <span class="session-task">${esc(r.task)}</span>
        <span class="session-ago">${agoTxt}</span>
      </div>`;
    }).join('');
  } catch(e) {}
}
loadAgentStatus();
setInterval(loadAgentStatus, 15000);
